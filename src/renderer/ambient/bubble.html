<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Дархай Ambient Bubble</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: transparent;
        user-select: none;
        -webkit-user-select: none;
      }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .ambient-bubble {
        width: 56px;
        height: 56px;
        border-radius: 50%;
        background: radial-gradient(circle at 35% 30%, #7aa5ff 0%, #4470ff 55%, #264ad1 100%);
        box-shadow:
          0 6px 18px rgba(68, 112, 255, 0.45),
          inset 0 2px 6px rgba(255, 255, 255, 0.35),
          inset 0 -2px 6px rgba(0, 0, 0, 0.15);
        cursor: grab;
        display: flex;
        align-items: center;
        justify-content: center;
        color: rgba(255, 255, 255, 0.95);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        font-size: 20px;
        font-weight: 600;
        letter-spacing: 0.5px;
      }
      .ambient-bubble.dragging {
        cursor: grabbing;
      }
      .ambient-bubble::after {
        content: '';
      }
    </style>
  </head>
  <body>
    <div class="ambient-bubble" data-testid="ambient-bubble">AI</div>
    <script type="module" src="./bubbleRenderer.ts"></script>
  </body>
</html>
