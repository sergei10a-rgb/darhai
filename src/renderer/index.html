<!doctype html>
<html data-theme="light" data-color-scheme="default">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="application-name" content="Wayland" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Wayland" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#4E5969" />
    <link rel="icon" type="image/png" href="./pwa/icon-192.png" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="apple-touch-icon" href="./pwa/icon-180.png" />
    <!-- UI System v1 typography — Sora display + IBM Plex Mono. Fallback chain
         in --forge-font / --forge-mono-font keeps the app legible if the CDN
         is unreachable on first launch. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Sora:wght@300;400;500;600;700;800&display=swap"
    />
    <title>Wayland</title>
    <script>
      // Synchronously restore theme from localStorage to prevent theme flash
      (function () {
        try {
          var theme = localStorage.getItem('__wayland_theme');
          var colorScheme = localStorage.getItem('__wayland_colorScheme');
          if (theme) {
            document.documentElement.setAttribute('data-theme', theme);
          }
          if (colorScheme) {
            document.documentElement.setAttribute('data-color-scheme', colorScheme);
          }
        } catch (e) {}
      })();
    </script>
    <style>
      html,
      body,
      #root {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <script>
      // Set arco-theme on body synchronously
      try {
        var t = localStorage.getItem('__wayland_theme');
        if (t) document.body.setAttribute('arco-theme', t);
      } catch (e) {}
    </script>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
